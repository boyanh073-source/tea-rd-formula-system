<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>茶饮研发配方系统</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">R</span>
          <div>
            <strong>茶饮研发配方系统</strong>
            <span>Formula Library · v2026.06.08-local-sync</span>
          </div>
        </div>

        <nav class="nav" aria-label="功能分区">
          <button class="nav-item active" data-view="materials">原料库</button>
          <button class="nav-item" data-view="blends">拼配方案库</button>
          <button class="nav-item" data-view="formulas">成品配方库</button>
          <button class="nav-item" data-view="records">其他记录</button>
          <button class="nav-item" data-view="settings">设置</button>
        </nav>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="page-kicker">配方资料</p>
            <h1 id="page-title">原料库</h1>
          </div>
          <div class="toolbar">
            <label class="search-box">
              <span>搜索</span>
              <input id="search-input" type="search" placeholder="编号 / 名称 / 关键词" />
            </label>
          </div>
        </header>

        <section id="view-root"></section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
